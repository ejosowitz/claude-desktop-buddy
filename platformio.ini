; Claude Desktop Buddy
;
; Two hardware targets share one M5Unified-based codebase:
;   m5stickc-plus   original M5StickC Plus  (ESP32   + AXP192 + MPU6886)
;   m5stack-sticks3 newer  M5StickS3        (ESP32-S3 + M5PM1  + BMI270)
;
; M5Unified auto-detects the board at runtime and abstracts the display
; (M5GFX), IMU, speaker and power management, so the same source builds for
; both. See src/compat.h for the thin shim that maps the legacy
; TFT_eSprite / RTC_*TypeDef / M5.Axp names onto M5Unified.

[platformio]
default_envs = m5stack-sticks3

[common]
framework = arduino
monitor_speed = 115200
build_src_filter = +<*> +<buddies/>
lib_deps =
    m5stack/M5Unified @ ^0.2.2
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0

; --- Original M5StickC Plus (ESP32 + AXP192) -------------------------------
[env:m5stickc-plus]
extends = common
platform = espressif32
board = m5stick-c
board_build.filesystem = littlefs
board_build.partitions = no_ota.csv
board_build.f_cpu = 160000000L
build_flags =
    -DCORE_DEBUG_LEVEL=0

; --- M5StickS3 (ESP32-S3-PICO-1-N8R8: 8MB flash + 8MB PSRAM) ---------------
[env:m5stack-sticks3]
extends = common
platform = espressif32 @ ^6.12.0
board = esp32-s3-devkitc-1
board_build.filesystem = littlefs
board_build.partitions = partitions_8mb.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 8MB
build_flags =
    -DBOARD_STICKS3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0
